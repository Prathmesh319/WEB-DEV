<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images in HTML</title>
</head>
<body>

<h1>HTML Image Tags</h1>

<section>
<h2>Basic Image</h2>
<img src="https://via.placeholder.com/400x200" alt="Placeholder Image" width="400" height="200">
</section>

<section>
<h2>Image with Title Attribute</h2>
<img src="https://via.placeholder.com/300x150/0000FF/FFFFFF?text=Blue+Image" alt="Blue placeholder" title="This is a blue placeholder image" width="300" height="150">
</section>

<section>
<h2>Image as a Link</h2>
<a href="https://www.google.com" target="_blank">
    <img src="https://via.placeholder.com/200x100/FF0000/FFFFFF?text=Click+Me" alt="Clickable Image" width="200" height="100">
</a>
<p>Click on the image above to visit Google.</p>
</section>

<section>
<h2>Image with Different Sizes</h2>
<p><strong>Small:</strong></p>
<img src="https://via.placeholder.com/100x100/00FF00/000000?text=Small" alt="Small image" width="100" height="100">
<p><strong>Medium:</strong></p>
<img src="https://via.placeholder.com/200x200/FFA500/000000?text=Medium" alt="Medium image" width="200" height="200">
<p><strong>Large:</strong></p>
<img src="https://via.placeholder.com/400x200/800080/FFFFFF?text=Large" alt="Large image" width="400" height="200">
</section>

<section>
<h2>Image with Border (Using Style)</h2>
<img src="https://via.placeholder.com/250x150/333333/FFFFFF?text=Bordered" alt="Bordered image" style="border: 3px solid black;" width="250" height="150">
</section>

<section>
<h2>Figure with Caption</h2>
<figure>
    <img src="https://via.placeholder.com/350x200/4682B4/FFFFFF?text=Figure+Image" alt="Figure example" width="350" height="200">
    <figcaption>Figure 1: A sample image with a caption using the figure and figcaption tags.</figcaption>
</figure>
</section>

</body>
</html>
