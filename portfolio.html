<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prathmesh's Web Dev Portfolio — SY Sem 3</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #050d18;
    --panel:    #07111f;
    --surface:  #0b1a2e;
    --border:   #0e3a5e;
    --cyan:     #00d4ff;
    --cyan-dim: #0080a0;
    --green:    #00ff88;
    --amber:    #ffaa00;
    --red:      #ff3c5e;
    --text:     #c8e8f8;
    --muted:    #4a7a9b;
    --grid-ln:  rgba(0,212,255,0.04);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BLUEPRINT BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-ln) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-ln) 1px, transparent 1px),
      linear-gradient(rgba(0,212,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.015) 1px, transparent 1px);
    background-size: 80px 80px, 80px 80px, 16px 16px, 16px 16px;
    pointer-events: none;
    z-index: 0;
  }

  /* SCANLINE OVERLAY */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
  }

  .header-inner {
    display: grid;
    grid-template-columns: 1fr auto;
    max-width: 1400px;
    margin: 0 auto;
  }

  .header-left {
    padding: 44px 48px 36px;
    border-right: 1px solid var(--border);
  }

  .header-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--cyan-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-tag::before {
    content: '//';
    color: var(--cyan);
    font-size: 12px;
  }

  .corner-bracket {
    display: inline-block;
    width: 10px; height: 10px;
    border-top: 2px solid var(--cyan);
    border-left: 2px solid var(--cyan);
    margin-right: 6px;
    vertical-align: middle;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 5vw, 3.8rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: #fff;
    text-shadow: 0 0 40px rgba(0,212,255,0.3);
  }

  h1 .accent {
    color: var(--cyan);
    text-shadow: 0 0 20px var(--cyan), 0 0 60px rgba(0,212,255,0.4);
  }

  .header-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 14px;
    letter-spacing: 0.1em;
  }

  .header-right {
    padding: 36px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 0;
    min-width: 180px;
  }

  .stat-block {
    text-align: right;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .stat-block:last-child { border-bottom: none; }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--cyan);
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-top: 4px;
  }

  /* ── PROGRESS BAR ── */
  .progress-section {
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--border);
    background: rgba(0,212,255,0.02);
  }

  .progress-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 16px 48px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .prog-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  .prog-track {
    flex: 1;
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .prog-track::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%);
    animation: shimmer 2s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .prog-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan));
    box-shadow: 0 0 12px var(--cyan);
    width: 0;
    animation: fillBar 1.8s cubic-bezier(0.16,1,0.3,1) 0.4s forwards;
  }

  @keyframes fillBar { to { width: 100%; } }

  .prog-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    white-space: nowrap;
    text-shadow: 0 0 8px var(--cyan);
  }

  /* ── MAIN ── */
  main {
    position: relative;
    z-index: 10;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 48px;
  }

  /* ── FILTER ── */
  .filter-row {
    display: flex;
    gap: 2px;
    margin-bottom: 36px;
    align-items: center;
  }

  .filter-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    margin-right: 12px;
  }

  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 18px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .filter-btn:hover {
    background: rgba(0,212,255,0.08);
    color: var(--cyan);
    border-color: var(--cyan-dim);
  }

  .filter-btn.active {
    background: rgba(0,212,255,0.15);
    color: var(--cyan);
    border-color: var(--cyan);
    box-shadow: 0 0 12px rgba(0,212,255,0.2), inset 0 0 12px rgba(0,212,255,0.05);
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
  }

  /* ── CARD ── */
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 24px 22px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease both;
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
  }

  /* corner cut triangle indicator */
  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 14px 14px 0;
    border-color: transparent var(--border) transparent transparent;
    transition: border-color 0.2s;
  }

  .card:nth-child(1) { animation-delay: 0.04s; }
  .card:nth-child(2) { animation-delay: 0.08s; }
  .card:nth-child(3) { animation-delay: 0.12s; }
  .card:nth-child(4) { animation-delay: 0.16s; }
  .card:nth-child(5) { animation-delay: 0.20s; }
  .card:nth-child(6) { animation-delay: 0.24s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    border-color: var(--cyan-dim);
    box-shadow: 0 0 24px rgba(0,212,255,0.1), inset 0 0 24px rgba(0,212,255,0.03);
    transform: translateY(-2px);
  }

  .card:hover::before {
    border-color: transparent var(--cyan) transparent transparent;
  }

  /* glowing line on hover */
  .card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover::after { opacity: 1; }

  .card.pending { opacity: 0.45; cursor: default; }
  .card.pending:hover { border-color: var(--border); box-shadow: none; transform: none; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .card-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .status-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .status-pill.done {
    background: rgba(0,255,136,0.1);
    color: var(--green);
    border: 1px solid rgba(0,255,136,0.3);
    box-shadow: 0 0 8px rgba(0,255,136,0.15);
  }

  .status-pill.pending {
    background: rgba(255,170,0,0.08);
    color: var(--amber);
    border: 1px solid rgba(255,170,0,0.25);
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    line-height: 1.3;
    color: #e0f4ff;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }

  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.65;
    font-weight: 300;
    margin-bottom: 16px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 18px;
  }

  .tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 7px;
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--cyan-dim);
  }

  .card-cta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: gap 0.2s;
    text-shadow: 0 0 8px var(--cyan);
  }

  .card:hover .card-cta { gap: 12px; }
  .card-cta::after { content: '▶'; font-size: 8px; }

  /* ── MODAL ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,8,18,0.92);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    overflow-y: auto;
  }

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 960px;
    min-height: 80vh;
    transform: translateY(20px);
    transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 0 60px rgba(0,212,255,0.08), 0 0 120px rgba(0,0,0,0.8);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 0 100%);
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 20px 20px 0;
    border-color: transparent var(--cyan) transparent transparent;
    z-index: 2;
  }

  .overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    background: rgba(0,212,255,0.03);
  }

  .modal-title-wrap { display: flex; flex-direction: column; gap: 4px; }

  .modal-eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 0 8px var(--cyan);
  }

  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: #e0f4ff;
    letter-spacing: 0.04em;
  }

  .modal-close {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 16px;
    border: 1px solid var(--cyan-dim);
    background: transparent;
    cursor: pointer;
    color: var(--cyan);
    transition: all 0.2s;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  }

  .modal-close:hover {
    background: rgba(0,212,255,0.15);
    box-shadow: 0 0 12px rgba(0,212,255,0.3);
  }

  .modal-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.2);
  }

  .tab-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 12px 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }

  .tab-btn.active {
    color: var(--cyan);
    border-bottom-color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan);
  }

  .modal-body { flex: 1; display: flex; flex-direction: column; }

  .preview-wrap {
    flex: 1;
    min-height: 500px;
    background: white;
  }

  .preview-wrap iframe {
    width: 100%;
    height: 100%;
    min-height: 500px;
    border: none;
    display: block;
  }

  .preview-wrap.hidden { display: none; }

  .code-wrap {
    flex: 1;
    overflow: auto;
    padding: 28px;
    background: #020810;
    display: none;
  }

  .code-wrap.visible { display: block; }

  pre {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    line-height: 1.9;
    white-space: pre-wrap;
    word-break: break-all;
    color: #4a7a9b;
  }

  .hl-tag   { color: #00d4ff; }
  .hl-attr  { color: #ffaa00; }
  .hl-val   { color: #00ff88; }
  .hl-comment { color: #2a4a6a; font-style: italic; }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    border-top: 1px solid var(--border);
    background: rgba(0,212,255,0.02);
  }

  .footer-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .footer-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--cyan);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: text-shadow 0.2s;
  }

  .footer-link:hover {
    text-shadow: 0 0 12px var(--cyan);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .header-inner { grid-template-columns: 1fr; }
    .header-left  { padding: 28px 24px; border-right: none; }
    .header-right { padding: 20px 24px; flex-direction: row; border-top: 1px solid var(--border); }
    main, .footer-inner, .progress-inner { padding-left: 24px; padding-right: 24px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <div class="header-tag">D.Y. Patil COET &nbsp;·&nbsp; Web Technology Lab</div>
      <h1>Prathmesh<br><span class="accent">Assignment</span><br>Portfolio</h1>
      <div class="header-sub">SY_B.TECH_CSE &nbsp;·&nbsp; SEM_III-IV &nbsp;·&nbsp; 2024-25</div>

    <div class="header-right">
      <div class="stat-block">
        <div class="stat-num">13</div>
        <div class="stat-label">Submitted</div>
      </div>
      <div class="stat-block">
        <div class="stat-num">13</div>

  <div class="grid" id="grid"></div>

<footer>
  <div class="footer-inner">
    <span class="footer-text">© 2025 Prathmesh &nbsp;·&nbsp; D.Y. Patil COET Kolhapur</span>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="handleOverlay(event)">
  <div class="modal" id="modal">
    <div class="modal-header">

        <div class="modal-eyebrow" id="mEyebrow"></div>

  </div>
</div>

  {
    num: "03", title: "Text Formatting Tags",
    desc: "Comprehensive showcase of HTML text formatting — bold, italic, code, semantic tags, headings, sub/superscript.",
    tags: ["HTML", "Typography", "Formatting"],
    status: "done",
    code: `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
<h1>XML Study — Assignment 11</h1>

<h2>What is XML?</h2>
<p>XML (eXtensible Markup Language) is a markup language for storing and transporting data. Unlike HTML, XML tags are user-defined.</p>

<div class="note">✦ XML is self-descriptive — the tags explain the data they contain.</div>

<h2>Sample XML Document</h2>
<pre>&lt;?xml version="1.0" encoding="UTF-8"?&gt;
&lt;students&gt;
  &lt;student id="1"&gt;
    &lt;name&gt;Prathmesh&lt;/name&gt;
    &lt;branch&gt;Computer Science&lt;/branch&gt;
    &lt;semester&gt;3&lt;/semester&gt;
    &lt;marks&gt;
      &lt;subject name="Web Technology"&gt;88&lt;/subject&gt;
      &lt;subject name="DBMS"&gt;82&lt;/subject&gt;
    &lt;/marks&gt;
  &lt;/student&gt;
&lt;/students&gt;</pre>

<h2>XSD Schema</h2>
<pre>&lt;xs:schema xmlns:xs="http://www.w3.org/2001/XMLSchema"&gt;
  &lt;xs:element name="students"&gt;
    &lt;xs:complexType&gt;
      &lt;xs:sequence&gt;
        &lt;xs:element name="student" maxOccurs="unbounded"&gt;
          &lt;xs:complexType&gt;
            &lt;xs:sequence&gt;
              &lt;xs:element name="name" type="xs:string"/&gt;
              &lt;xs:element name="branch" type="xs:string"/&gt;
              &lt;xs:element name="semester" type="xs:integer"/&gt;
            &lt;/xs:sequence&gt;
            &lt;xs:attribute name="id" type="xs:integer"/&gt;
          &lt;/xs:complexType&gt;
        &lt;/xs:element&gt;
      &lt;/xs:sequence&gt;
    &lt;/xs:complexType&gt;
  &lt;/xs:element&gt;
&lt;/xs:schema&gt;</pre>

<h2>XML Rules</h2>
<ul>
  <li>Must have a root element</li>
  <li>All elements must be properly closed</li>
  <li>Tags are case-sensitive</li>
  <li>Attributes must be quoted</li>
  <li>Elements must be properly nested</li>
</ul>
</body>
</html>`

function renderGrid(filter = 'all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  assignments.forEach(a => {
    if (filter !== 'all' && a.status !== filter) return;
    const card = document.createElement('div');
    card.className = `card ${a.status}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-num">Assignment ${a.num}</div>
        <span class="status-pill ${a.status}">${a.status === 'done' ? 'Submitted' : 'Pending'}</span>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-tags">${a.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      ${a.status === 'done' ? '<div class="card-cta">View Assignment</div>' : ''}
    `;
    if (a.status === 'done') card.onclick = () => openModal(a);
    grid.appendChild(card);
  });
}

function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(filter);
}

function openModal(a) {
  document.getElementById('mEyebrow').textContent = `Assignment ${a.num}`;
  document.getElementById('mTitle').textContent = a.title;
  document.getElementById('frame').srcdoc = a.code;
  document.getElementById('codeContent').innerHTML = highlight(a.code);
  switchTab('preview');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

function switchTab(tab) {
  const isPreview = tab === 'preview';
  document.getElementById('previewWrap').classList.toggle('hidden', !isPreview);
  document.getElementById('codeWrap').classList.toggle('visible', !isPreview);
  document.getElementById('tabP').classList.toggle('active', isPreview);
  document.getElementById('tabC').classList.toggle('active', !isPreview);
}

function highlight(code) {
  return code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/(<!--[\s\S]*?-->)/g, '<span class="hl-comment">$1</span>')
    .replace(/(&lt;\/?)([\w:]+)/g, '<span class="hl-tag">$1$2</span>')
    .replace(/\s([\w:-]+)=/g, ' <span class="hl-attr">$1</span>=')
    .replace(/="([^"]*)"/g, '="<span class="hl-val">$1</span>"');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
renderGrid();
</script>
</body>
</html>
